spring:
  application:
    name: humanresourcemanagement
  datasource:
    url: jdbc:postgresql://localhost:5332/hrms
    username: hrms_user
    password: hrms_pass
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
