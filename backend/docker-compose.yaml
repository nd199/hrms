services:
  # === Employee Database ===
  employee-pg:
    container_name: employee_db
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: employee_db
      POSTGRES_USER: employee_user
      POSTGRES_PASSWORD: employee_pass
    ports:
      - "5433:5432"
    volumes:
      - employee_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employee_user -d employee_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Employee Microservice ===
  employee-service:
    container_name: employee_service
    build:
      context: ./employee-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://employee-pg:5432/employee_db
      SPRING_DATASOURCE_USERNAME: employee_user
      SPRING_DATASOURCE_PASSWORD: employee_pass
    depends_on:
      employee-pg:
        condition: service_healthy

  # === Department Database ===
  department-pg:
    container_name: department_db
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: department_db
      POSTGRES_USER: department_user
      POSTGRES_PASSWORD: department_pass
    ports:
      - "5434:5432"
    volumes:
      - department_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U department_user -d department_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Department Microservice ===
  department-service:
    container_name: department_service
    build:
      context: ./department-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://department-pg:5432/department_db
      SPRING_DATASOURCE_USERNAME: department_user
      SPRING_DATASOURCE_PASSWORD: department_pass
    depends_on:
      department-pg:
        condition: service_healthy

  # === Leave Database ===
  leave-pg:
    container_name: leave_db
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: leave_db
      POSTGRES_USER: leave_user
      POSTGRES_PASSWORD: leave_pass
    ports:
      - "5435:5432"
    volumes:
      - leave_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leave_user -d leave_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Leave Microservice ===
  leave-service:
    container_name: leave_service
    build:
      context: ./leave-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://leave-pg:5432/leave_db
      SPRING_DATASOURCE_USERNAME: leave_user
      SPRING_DATASOURCE_PASSWORD: leave_pass
    depends_on:
      leave-pg:
        condition: service_healthy

  # === Auth Database ===
  auth-pg:
    container_name: auth_db
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5436:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Auth Microservice ===
  auth-service:
    container_name: auth_service
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-pg:5432/auth_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production-env-var}
    depends_on:
      auth-pg:
        condition: service_healthy

  # === API Gateway ===
  gateway:
    container_name: hrms_gateway
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      EMPLOYEE_SERVICE_URL: http://employee-service:8081
      DEPARTMENT_SERVICE_URL: http://department-service:8083
      LEAVE_SERVICE_URL: http://leave-service:8084
      AUTH_SERVICE_URL: http://auth-service:8086
    depends_on:
      - employee-service
      - department-service
      - leave-service
      - auth-service

volumes:
  employee_data:
  department_data:
  leave_data:
  auth_data:
