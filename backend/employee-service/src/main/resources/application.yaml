spring:
  application:
    name: employee-service
  datasource:
    url: jdbc:postgresql://localhost:5433/employee_db
    username: employee_user
    password: employee_pass
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8081