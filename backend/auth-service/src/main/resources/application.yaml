spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5436/auth_db
    username: auth_user
    password: auth_pass
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8086

jwt:
  secret: your-256-bit-secret-key-change-in-production-env-var
  access-expiry-seconds: 3600
  refresh-expiry-seconds: 604800
