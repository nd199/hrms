spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # Employee
        - id: employee-service
          uri: ${EMPLOYEE_SERVICE_URL}
          predicates:
           - Path=/api/employees/**

        #Monolith for now
        - id: backend
          uri: ${BACKEND_URL}
          predicates:
              - Path=/**
      globalcors:
        corsConfiguration:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

server:
  port: 8082

